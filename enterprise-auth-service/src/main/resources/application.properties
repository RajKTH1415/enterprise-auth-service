spring.application.name=enterprise-auth-service


#Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/dongle_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# LAZY INITIALIZATION (VERY IMPORTANT)
spring.main.lazy-initialization=true


# JPA / HIBERNATE OPTIMIZATION
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true


# HIKARI CONNECTION POOL (DB PERFORMANCE)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000


# JACKSON OPTIMIZATION

spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null
